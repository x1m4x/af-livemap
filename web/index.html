<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>AF LiveMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar">
  <span id="logo">AF LiveMap</span>
  <select id="worldSelect" title="Мир"></select>
  <label><input type="checkbox" id="followToggle" checked> Следовать</label>
  <label><input type="checkbox" id="trailToggle" checked> След</label>
  <button id="view3dBtn">3D</button>
  <button id="addWaypointBtn" title="Поставить точку на месте игрока">+ Точка</button>
  <button id="elevatorBtn" title="Записать лифт: нажми в кабине, прокатись по всем этажам, нажми ещё раз">Лифт</button>
  <button id="cartBtn" title="Записать тележку: нажми сев в неё, доедь до конца, нажми ещё раз">Тележка</button>
  <button id="waypointsBtn">Точки</button>
  <button id="imagesBtn">Карты</button>
  <button id="notesBtn">Заметки</button>
  <span id="status" class="status-wait">ожидание…</span>
</div>
<div id="waypointPanel" class="hidden">
  <div id="waypointList"></div>
  <button id="noPortalBtn" title="Телепорты в эту зону не будут записываться как порталы">🚫 Зона «не портал» здесь</button>
  <div id="routeStatus"></div>
</div>
<div id="notesPopup" class="hidden">
  <div id="notesHeader">
    <span id="notesStatus"></span>
    <button id="notesClose">Закрыть</button>
  </div>
  <textarea id="notesText" placeholder="Заметки: координаты, планы, что где лежит… Сохраняются на сервере и видны с ПК и телефона." spellcheck="false"></textarea>
</div>
<div id="imagesPopup" class="hidden">
  <div id="imagesHeader">
    <select id="imageSelect"></select>
    <button id="imagesClose">Закрыть</button>
  </div>
  <div id="imageWrap"><img id="imageView" alt="Карта сектора"></div>
</div>
<canvas id="map"></canvas>
<canvas id="map3d" class="hidden"></canvas>
<canvas id="hud3d" class="hidden"></canvas>
<div id="coords"></div>
<script src="view3d.js"></script>
<script src="app.js"></script>
</body>
</html>
