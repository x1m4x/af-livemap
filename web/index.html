<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AF LiveMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="topbar">
  <span id="logo">AF LiveMap</span>
  <select id="worldSelect" data-i18n-title="world_title"></select>
  <label><input type="checkbox" id="followToggle" checked> <span data-i18n="follow"></span></label>
  <label><input type="checkbox" id="trailToggle" checked> <span data-i18n="trail"></span></label>
  <button id="view3dBtn">3D</button>
  <button id="addWaypointBtn" data-i18n="add_waypoint" data-i18n-title="add_waypoint_title"></button>
  <button id="elevatorBtn" data-i18n="elevator" data-i18n-title="elevator_title"></button>
  <button id="cartBtn" data-i18n="cart" data-i18n-title="cart_title"></button>
  <button id="waypointsBtn" data-i18n="waypoints_btn"></button>
  <button id="imagesBtn" data-i18n="images_btn"></button>
  <button id="notesBtn" data-i18n="notes_btn"></button>
  <select id="langSelect" data-i18n-title="lang_title">
    <option value="en">EN</option>
    <option value="ru">RU</option>
  </select>
  <span id="status" class="status-wait" data-i18n="status_waiting"></span>
</div>
<div id="waypointPanel" class="hidden">
  <div id="waypointList"></div>
  <button id="noPortalBtn" data-i18n="no_portal_btn" data-i18n-title="no_portal_title"></button>
  <div id="routeStatus"></div>
</div>
<div id="notesPopup" class="hidden">
  <div id="notesHeader">
    <span id="notesStatus"></span>
    <button id="notesClose" data-i18n="close"></button>
  </div>
  <textarea id="notesText" data-i18n-placeholder="notes_placeholder" spellcheck="false"></textarea>
</div>
<div id="imagesPopup" class="hidden">
  <div id="imagesHeader">
    <select id="imageSelect"></select>
    <button id="imagesClose" data-i18n="close"></button>
  </div>
  <div id="imageWrap"><img id="imageView" data-i18n-alt="image_alt"></div>
</div>
<canvas id="map"></canvas>
<canvas id="map3d" class="hidden"></canvas>
<canvas id="hud3d" class="hidden"></canvas>
<div id="coords"></div>
<script src="i18n.js"></script>
<script src="view3d.js"></script>
<script src="app.js"></script>
</body>
</html>
